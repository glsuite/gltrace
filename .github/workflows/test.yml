name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: bats
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (bats-core, jq)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y bats jq

      - name: Run tests
        run: bats tests/
